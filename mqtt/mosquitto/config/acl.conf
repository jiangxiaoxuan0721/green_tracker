# ============================================================
# Mosquitto ACL 权限规则
#
# 规则说明:
#   - admin 用户: 全部 topic 读写权限（云端服务器用）
#   - 设备用户 (%u = 当前登录用户名, 即 device_id):
#       * 可读写自己的 topic
#       * 可读取其他设备的 topic（可选，用于设备间通信）
# ============================================================

# admin: 全部权限
user admin
topic readwrite #

# 所有已认证设备用户: 可访问自己的 topic
pattern readwrite green-tracker/device/%u/#

# 设备用户允许读取所有设备主题（跨设备监控）
pattern read green-tracker/device/+/#
